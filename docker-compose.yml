services:
  frontend:
    build: .
    container_name: escapemaster-frontend
    ports:
      - "4321:4321"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
